		<h1>html5</h1>
		<h2>기본태그</h2>
		
		<form>
			<label for="chk-id">아이디</label>
			<input id="chk-id" type="text" name="id" value="" placeholder="전화번호를 입력해 주세요"> 
			
			<br>
			<br>
			<label for="chk-nick">닉네임</label>
			<input id="chk-nick" type="text" name="nick" value="" placeholder="이름을 입력해 주세요"> 
			<br>
			<br>
			<label for="chk-pw">패스워드</label>
			<input id="chk-pw" type="password" name="pw" placeholder="비밀번호를 입력해 주세요">
			<br>
			<br>
			<input type="hidden">
			<label for="fs">프로필 사진</label>
			<input id="fs" type="file">
			<br>
			<br>
			<label for="chk-book">독서</label><input id="chk-book" type="checkbox" name="hobby" value="book">
			<br>
			<label for="chk-music">음악</label><input id="chk-music" type="checkbox" name="hobby" value="music">  
			<br>
			<label for="chk-trip">여행</label><input id="chk-trip" type="checkbox" name="hobby" value="trip">
			<br>
			<br>
			<label for="chk-dog">개</label><input id="chk-dog" type="checkbox" name="pet" value="dog">
			<label for="chk-cat">고양이</label><input id="chk-cat" type="checkbox" name="pet" value="cat">
			<label for="chk-bird">새</label> <input id="chk-bird" type="checkbox" name="pet" value="bird">
			<br>
			<br>
			<label for="rdo-apple">사과</label>
			<input id="rdo-apple" name="fruit" value="apple"type="radio">
			<br>
			<label for="rdo-grapd">포도</label>
			<input id="rdo-grape" name="fruit" value="grape" type="radio">
			<br>
			<label for="rdo-orange">오렌지</label>
			<input id="rdo-orange" name="fruit" value="orange" type="radio">
			<br>
			<label>1월</label>
			<input id="rdo-m1" type="radio" name="months">
			<label>2월</label>
			<input id="rdo-m2" type="radio" name="months">
			<label>3월</label>
			<input id="rdo-m3" type="radio" name="months">
			<br>
			<br>
			<label for="sel=telecom">통신사</label>
		<select id="sel-telecom" name="telecom">
			<option value="" selected="selected">통신사를 선택해 주세요</option>
			<option value="skt">SKT</option>
			<option value="kt">KT</option>
			<option value="lg">LG</option>
			<option value="etc">기타</option>
		</select>
		<br>
		<br>
		<textarea name="content">안녕하세요</textarea>
		<br>
		<br>
		<button type="submit">전송</button>
		<!-- 			<input type="submit" value="회원가입"> 이런 스타일로 작성하지말고 위에 스타일로 작성할 것 -->

		</form>
